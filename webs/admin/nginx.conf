server {
  listen 80;
  listen [::]:80;

  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  charset utf-8;
  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/xml
    application/manifest+json
    image/svg+xml
    font/woff
    font/woff2;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location ^~ /_nuxt/ {
    try_files $uri =404;

    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf|otf)$ {
    try_files $uri =404;

    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  location = /index.html {
    try_files $uri =404;

    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}