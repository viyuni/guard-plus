name: guard-plus-app

x-app-build: &app-build
  context: ..
  dockerfile: server/Dockerfile

x-logging: &logging
  driver: local
  options:
    max-size: 20m
    max-file: 10

x-app-environment: &app-environment
  NODE_ENV: ${NODE_ENV:-production}
  DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-guard_plus}@db:5432/${POSTGRES_DB:-guard-plus}
  REDIS_URL: redis://redis:6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.prod}
  IMAGE_SAVE_PATH: /app/server/public/images
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DATA_SECRET: ${DATA_SECRET:?set DATA_SECRET in .env.prod}
  PASSWORD_HASH_COST: ${PASSWORD_HASH_COST:-12}
  BILI_ROOM: ${BILI_ROOM:?set BILI_ROOM in .env.prod}
  BILI_REGISTER_CODE_TTL_SECONDS: ${BILI_REGISTER_CODE_TTL_SECONDS:-300}
  REDIS_CONNECTION_TIMEOUT_MS: ${REDIS_CONNECTION_TIMEOUT_MS:-5000}
  REDIS_IDLE_TIMEOUT_MS: ${REDIS_IDLE_TIMEOUT_MS:-0}
  REDIS_MAX_RETRIES: ${REDIS_MAX_RETRIES:-100}

x-db-push-environment: &db-push-environment
  NODE_ENV: ${NODE_ENV:-production}
  DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-guard_plus}@db:5432/${POSTGRES_DB:-guard-plus}

x-app-depends-on: &app-depends-on
  db-push:
    condition: service_completed_successfully
  db:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  db:
    image: postgres:18-alpine
    container_name: db
    restart: unless-stopped
    logging: *logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guard_plus}
      POSTGRES_DB: ${POSTGRES_DB:-guard-plus}
    ports:
      - target: 5432
        published: ${GUARD_PLUS_POSTGRES_PUBLISHED_PORT:-39699}
        protocol: tcp
        host_ip: 0.0.0.0
    volumes:
      - /home/guard-plus-data/postgres:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - guard-plus

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    logging: *logging
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env.prod}
    command:
      - sh
      - -c
      - >-
        redis-server
        --requirepass "$$REDIS_PASSWORD"
        --appendonly yes
        --appendfsync everysec
        --save "900 1"
        --save "300 10"
        --save "60 10000"
    ports:
      - target: 6379
        published: ${GUARD_PLUS_REDIS_PUBLISHED_PORT:-39679}
        protocol: tcp
        host_ip: 0.0.0.0
    volumes:
      - /home/guard-plus-data/redis:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - guard-plus

  db-push:
    build:
      <<: *app-build
      target: db-push
    container_name: db-push
    restart: 'no'
    logging: *logging
    environment:
      <<: *db-push-environment
    depends_on:
      db:
        condition: service_healthy
    networks:
      - guard-plus

  admin-server:
    build:
      <<: *app-build
      target: admin-server
    container_name: admin-server
    restart: unless-stopped
    logging: *logging
    environment:
      <<: *app-environment
      ADMIN_PORT: 3600
      ADMIN_ORIGINS: ${ADMIN_ORIGINS:?set ADMIN_ORIGINS in .env.prod}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?set ADMIN_JWT_SECRET in .env.prod}
      SUPER_ADMIN_UID: ${SUPER_ADMIN_UID:-0721}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-Admin}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?set SUPER_ADMIN_PASSWORD in .env.prod}
    ports:
      - target: 3600
        published: ${GUARD_PLUS_ADMIN_PUBLISHED_PORT:-39960}
        protocol: tcp
        host_ip: 0.0.0.0
    volumes:
      - /home/guard-plus-data/public:/app/server/public
    depends_on: *app-depends-on
    networks:
      - guard-plus

  user-server:
    build:
      <<: *app-build
      target: user-server
    container_name: user-server
    restart: unless-stopped
    logging: *logging
    environment:
      <<: *app-environment
      USER_PORT: 3800
      USER_ORIGINS: ${USER_ORIGINS:?set USER_ORIGINS in .env.prod}
      USER_JWT_SECRET: ${USER_JWT_SECRET:?set USER_JWT_SECRET in .env.prod}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NOTIFY_EMAILS: ${NOTIFY_EMAILS:-}
    ports:
      - target: 3800
        published: ${GUARD_PLUS_USER_PUBLISHED_PORT:-39980}
        protocol: tcp
        host_ip: 0.0.0.0
    volumes:
      - /home/guard-plus-data/public:/app/server/public
    depends_on: *app-depends-on
    networks:
      - guard-plus

  event-server:
    build:
      <<: *app-build
      target: event-server
    container_name: event-server
    restart: unless-stopped
    logging: *logging
    environment:
      <<: *app-environment
      VIYUNI_LOGIN_SYNC_URL: ${VIYUNI_LOGIN_SYNC_URL:?set VIYUNI_LOGIN_SYNC_URL in .env.prod}
      VIYUNI_LOGIN_SYNC_PASSWORD: ${VIYUNI_LOGIN_SYNC_PASSWORD:?set VIYUNI_LOGIN_SYNC_PASSWORD in .env.prod}
    depends_on: *app-depends-on
    networks:
      - guard-plus

networks:
  guard-plus:
    name: guard-plus
